name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Build SNP reference
        run: python data/build_reference.py

      - name: Run tests
        run: python -m pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: pip install flake8
      - name: Lint
        # E2xx/E3xx/E4xx: intentional column-aligned style used throughout the codebase.
        # F401: unused imports are pre-existing; tracked separately.
        # F541: bare f-strings in app.py are pre-existing.
        # E741: ambiguous variable name in parsers.py is pre-existing.
        # W503: line break before binary operator — Black-compatible style.
        run: flake8 backend/ data/ app.py --max-line-length=120 --ignore=E501,W503,E221,E226,E231,E241,E302,E303,E305,E401,E402,F401,F541,E741
